# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
  - main

pool:
  vmImage: ubuntu-latest


stages:

  - stage: build_plus_test
    jobs:
      - job: buildi_image_front
        steps:
          - checkout: self
          - script: |
              cd frontend
              npm install
              npm run build
              
      - job: deploy_docker
        steps:
          - checkout: self
          - script: |
              cd frontend
              sleep 10
              docker build -t imagefront .